<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国ダンスマップ ホーム</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Noto Sans JPをGoogle Fontsから読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/animate.min.css">
</head>

<body>
  <container>
    <!-- ヘッダー -->
    <header class="site-header">
      <div class="logo">
        <a href="home.html">
          <img src="images/dancemaplogo.png" alt="Dance Map Logo"
            class="logo-img animate__animated animate__pulse animate__infinite animate__slow">

      </div>
      <nav>
        <ul>
          <li>
            <a href="home.html" data-tooltip="トップページに戻ります">ホーム</a>
          </li>
          <li>
            <a href="index.html" data-tooltip="全国のダンス教室・練習場・ダンス用品店などを探せます">教室を探す</a>
          </li>
          <li>
            <a href="events.html" data-tooltip="全国のダンスパーティ・サークル活動・ダンス関連イベントを探せます">イベントを探す</a>
          </li>
          <li>
            <a href="contact.html" data-tooltip="お問い合わせはこちら">お問い合わせ</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- メインコンテンツ -->
    <main>
      <div class="main-image">
        <video src="images/dance_movie.mp4" autoplay muted loop playsinline poster="images/dance1.png">
        </video>

        <div class="slide-caption animate__animated">踊りませんか、あなたの街で。</div>
      </div>
    </main>
    <!-- フッター -->
    <footer class="site-footer">
      <div class="footer-content">
        <nav>
          <ul>
            <li><a href="home.html" data-page="index">ホーム</a></li>
            <li><a href="index.html" data-page="index">教室を探す</a></li>
            <li><a href="events.html" data-page="events">イベントを探す</a></li>
            <li><a href="contact.html" data-page="contact">お問い合わせ</a></li>
          </ul>
        </nav>
      </div>
      <div>
        <p>&copy; 全国ダンスマップ All rights reserved.</p>
      </div>
      <nav class="footer-nav"></nav>
    </footer>
  </container>
</body>

</html>
