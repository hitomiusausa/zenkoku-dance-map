<header class="site-header">
    <!-- ロゴ -->
    <div class="logo">
        <a href="index.html">
            <img src="images/dancemaplogo.png" alt="Dance Map Logo" class="logo-img">
        </a>
    </div>

    <!-- ナビゲーション -->
    <nav class="site-nav">
        <ul>
            <li><a href="home.html" data-page="index">ホーム</a></li>

    <script>
        // 現在のページに基づいてアクティブなナビゲーションを設定
        const currentPage = window.location.pathname.split("/").pop().split(".")[0];
        document.querySelectorAll('.site-nav a').forEach(link => {
            if (link.dataset.page === currentPage) {
                link.classList.add('active');
            }
        });
    </script>
